<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="320" rx="16" fill="url(#bg)"/>
  <g transform="translate(80,32)">
    <rect width="240" height="240" rx="10" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2"/>
    <!-- Grid lines -->
    <g stroke="#adb5bd" stroke-width="1">
      <line x1="80" y1="0" x2="80" y2="240"/><line x1="160" y1="0" x2="160" y2="240"/>
      <line x1="0" y1="80" x2="240" y2="80"/><line x1="0" y1="160" x2="240" y2="160"/>
      <line x1="26.67" y1="0" x2="26.67" y2="240"/><line x1="53.33" y1="0" x2="53.33" y2="240"/>
      <line x1="106.67" y1="0" x2="106.67" y2="240"/><line x1="133.33" y1="0" x2="133.33" y2="240"/>
      <line x1="186.67" y1="0" x2="186.67" y2="240"/><line x1="213.33" y1="0" x2="213.33" y2="240"/>
      <line x1="0" y1="26.67" x2="240" y2="26.67"/><line x1="0" y1="53.33" x2="240" y2="53.33"/>
      <line x1="0" y1="106.67" x2="240" y2="106.67"/><line x1="0" y1="133.33" x2="240" y2="133.33"/>
      <line x1="0" y1="186.67" x2="240" y2="186.67"/><line x1="0" y1="213.33" x2="240" y2="213.33"/>
    </g>
    <rect x="0" y="0" width="240" height="240" rx="10" fill="none" stroke="#495057" stroke-width="3"/>
    <line x1="80" y1="0" x2="80" y2="240" stroke="#495057" stroke-width="3"/>
    <line x1="160" y1="0" x2="160" y2="240" stroke="#495057" stroke-width="3"/>
    <line x1="0" y1="80" x2="240" y2="80" stroke="#495057" stroke-width="3"/>
    <line x1="0" y1="160" x2="240" y2="160" stroke="#495057" stroke-width="3"/>
    <!-- Numbers -->
    <text x="40" y="52" text-anchor="middle" fill="#2563eb" font-family="system-ui,sans-serif" font-size="22" font-weight="700">5</text>
    <text x="120" y="52" text-anchor="middle" fill="#111" font-family="system-ui,sans-serif" font-size="22" font-weight="700">3</text>
    <text x="200" y="52" text-anchor="middle" fill="#111" font-family="system-ui,sans-serif" font-size="22" font-weight="700">7</text>
    <text x="40" y="132" text-anchor="middle" fill="#111" font-family="system-ui,sans-serif" font-size="22" font-weight="700">6</text>
    <text x="120" y="132" text-anchor="middle" fill="#2563eb" font-family="system-ui,sans-serif" font-size="22" font-weight="700">
      1<animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/>
    </text>
    <text x="200" y="132" text-anchor="middle" fill="#111" font-family="system-ui,sans-serif" font-size="22" font-weight="700">9</text>
    <text x="40" y="212" text-anchor="middle" fill="#111" font-family="system-ui,sans-serif" font-size="22" font-weight="700">8</text>
    <text x="120" y="212" text-anchor="middle" fill="#111" font-family="system-ui,sans-serif" font-size="22" font-weight="700">4</text>
    <text x="200" y="212" text-anchor="middle" fill="#2563eb" font-family="system-ui,sans-serif" font-size="22" font-weight="700">
      2<animate attributeName="opacity" values="1;0;1;1" dur="3s" repeatCount="indefinite"/>
    </text>
    <!-- Highlight cell -->
    <rect x="80" y="80" width="80" height="80" fill="#2563eb" opacity="0">
      <animate attributeName="opacity" values="0;.12;0" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="200" y="300" text-anchor="middle" fill="#74c0fc" font-family="system-ui,sans-serif" font-size="13" letter-spacing="3">LOGIC PUZZLES</text>
</svg>

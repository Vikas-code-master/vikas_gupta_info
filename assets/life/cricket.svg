<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f5132"/>
      <stop offset="60%" stop-color="#198754"/>
      <stop offset="100%" stop-color="#20c997"/>
    </linearGradient>
    <radialGradient id="ball" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#c92a2a"/>
    </radialGradient>
  </defs>
  <rect width="400" height="320" rx="16" fill="url(#sky)"/>
  <ellipse cx="200" cy="280" rx="160" ry="24" fill="#0a3622" opacity=".5"/>
  <!-- Pitch -->
  <rect x="160" y="60" width="80" height="220" rx="4" fill="#d4a574" opacity=".85"/>
  <rect x="168" y="68" width="64" height="204" fill="#c4956a" opacity=".6"/>
  <!-- Stumps -->
  <g transform="translate(188,72)">
    <rect x="0" y="0" width="4" height="36" fill="#f8f9fa" rx="1"/>
    <rect x="12" y="0" width="4" height="36" fill="#f8f9fa" rx="1"/>
    <rect x="24" y="0" width="4" height="36" fill="#f8f9fa" rx="1"/>
    <rect x="-2" y="-4" width="32" height="4" fill="#dee2e6" rx="1"/>
  </g>
  <!-- Bat -->
  <g transform="translate(260,140) rotate(25)">
    <rect x="0" y="0" width="12" height="80" rx="4" fill="#8b6914"/>
    <rect x="2" y="70" width="8" height="30" rx="2" fill="#6b4f0a"/>
  </g>
  <!-- Ball with arc -->
  <g>
    <circle cx="200" cy="200" r="14" fill="url(#ball)">
      <animate attributeName="cy" values="200;80;200" dur="2.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
      <animate attributeName="cx" values="200;220;200" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <path d="M180 200 Q200 120 220 80" stroke="rgba(255,255,255,.25)" stroke-width="2" stroke-dasharray="6 6" fill="none">
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <!-- Seam -->
    <ellipse cx="200" cy="200" rx="14" ry="4" stroke="#fff" stroke-width="1" fill="none" opacity=".4">
      <animate attributeName="cy" values="200;80;200" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="200;220;200" dur="2.4s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  <text x="200" y="300" text-anchor="middle" fill="rgba(255,255,255,.7)" font-family="system-ui,sans-serif" font-size="13" letter-spacing="3">ON THE PITCH</text>
</svg>

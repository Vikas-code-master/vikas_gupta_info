<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <defs>
    <linearGradient id="board" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="320" rx="16" fill="url(#board)"/>
  <g transform="translate(72,48) rotate(-8 128 112)">
    <rect width="256" height="256" rx="8" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
    <g>
      <rect x="0" y="0" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="64" y="0" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="128" y="0" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="192" y="0" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="32" y="32" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="96" y="32" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="160" y="32" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="224" y="32" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="0" y="64" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="64" y="64" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="128" y="64" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="192" y="64" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="32" y="96" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="96" y="96" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="160" y="96" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="224" y="96" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="0" y="128" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="64" y="128" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="128" y="128" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="192" y="128" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="32" y="160" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="96" y="160" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="160" y="160" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="224" y="160" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="0" y="192" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="64" y="192" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="128" y="192" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="192" y="192" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="32" y="224" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="96" y="224" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="160" y="224" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
      <rect x="224" y="224" width="32" height="32" fill="#e8e0d4" opacity=".95"/>
    </g>
    <!-- Knight -->
    <g filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="96,160; 128,128; 160,96; 128,128; 96,160" dur="6s" repeatCount="indefinite"/>
      <circle cx="16" cy="16" r="14" fill="#f5f5f5"/>
      <path d="M8 22 Q16 4 24 14 Q20 20 16 18 Q12 22 8 22" fill="#333"/>
      <circle cx="20" cy="10" r="2" fill="#111"/>
    </g>
    <!-- King -->
    <g opacity=".9">
      <animateTransform attributeName="transform" type="translate" values="160,192; 160,192; 128,160; 160,192" dur="6s" repeatCount="indefinite"/>
      <circle cx="16" cy="16" r="14" fill="#ffd700"/>
      <rect x="13" y="4" width="6" height="8" fill="#ffd700"/>
      <rect x="10" y="7" width="12" height="3" fill="#ffd700"/>
    </g>
  </g>
  <text x="200" y="300" text-anchor="middle" fill="#888" font-family="system-ui,sans-serif" font-size="13" letter-spacing="3">STRATEGY</text>
</svg>
